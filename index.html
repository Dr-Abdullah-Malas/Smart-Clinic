<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Clinic Cloud App</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f4f4f9; }
        .card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        input, select { display: block; width: 100%; margin: 10px 0; padding: 10px; }
        button { padding: 10px 20px; background: teal; color: white; border: none; cursor: pointer; }
    </style>
</head>
<body>

    <div class="card">
        <h2>إضافة مريض جديد</h2>
        <input type="text" id="pName" placeholder="اسم المريض">
        <input type="text" id="pPhone" placeholder="رقم الهاتف">
        <select id="pProc">
            <option>خلع</option>
            <option>عصب</option>
        </select>
        <button onclick="addPatient()">حفظ في السحاب</button>
    </div>

    <div class="card" style="margin-top:20px;">
        <h2>قائمة المرضى (مزامنة لحظية)</h2>
        <div id="list">جاري التحميل...</div>
    </div>

    <script>
        const SUPABASE_URL = "https://wuttsknlwfhupvwjqjks.supabase.co";
        const SUPABASE_KEY = "sb_publishable_c0ww0-XGjqkQQKKnuHADKg_ZIRhB9D_"; // ملاحظة: هذا مفتاح عام
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // إضافة مريض
        async function addPatient() {
            const name = document.getElementById('pName').value;
            const phone = document.getElementById('pPhone').value;
            const proc = document.getElementById('pProc').value;
            
            const { error } = await supabase.from('appointments').insert([{ name, phone, proc }]);
            if (error) alert("خطأ: " + error.message);
            else { alert("تم الحفظ!"); document.getElementById('pName').value = ''; }
        }

        // جلب البيانات
        async function getPatients() {
            const { data } = await supabase.from('appointments').select('*');
            document.getElementById('list').innerHTML = data.map(p => `<p>${p.name} - ${p.proc}</p>`).join('');
        }

        // تحديث لحظي (Realtime)
        supabase.channel('any').on('postgres_changes', { event: '*', schema: 'public', table: 'appointments' }, getPatients).subscribe();

        getPatients();
    </script>
</body>
</html>
