<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>نظام العيادة - النسخة المدمجة</title>
    <!-- مكتبة Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* التنسيق الأساسي للواجهة */
        body { font-family: sans-serif; padding: 20px; background: #f4f4f4; }
        .card { background: white; padding: 20px; border-radius: 10px; margin-bottom: 20px; }
        input, button { padding: 10px; margin: 5px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: center; }
    </style>
</head>
<body>

<div class="card">
    <h3>إضافة مريض جديد</h3>
    <input type="text" id="pName" placeholder="اسم المريض">
    <input type="text" id="pProc" placeholder="العملية">
    <button onclick="addPatient()">حفظ في السحابة</button>
    <p id="status"></p>
</div>

<div class="card">
    <h3>قائمة المرضى (مزامنة سحابية)</h3>
    <table>
        <thead><tr><th>الاسم</th><th>العملية</th><th>حذف</th></tr></thead>
        <tbody id="pTable"></tbody>
    </table>
</div>

<script>
    // 1. إعداد الاتصال (ضع بياناتك من Supabase هنا)
    const supabase = supabase.createClient('https://wuttsknlwfhupvwjqjks.supabase.co', 'sb_publishable_c0ww0-XGjqkQQKKnuHADKg_ZIRhB9D_');

    // 2. دالة جلب البيانات وعرضها
    async function loadPatients() {
        const { data, error } = await supabase.from('appointments').select('*');
        if (error) { console.error(error); return; }
        
        const tbody = document.getElementById('pTable');
        tbody.innerHTML = '';
        data.forEach(p => {
            tbody.innerHTML += `<tr><td>${p.name}</td><td>${p.proc}</td>
            <td><button onclick="deletePatient(${p.id})">حذف</button></td></tr>`;
        });
    }

    // 3. دالة إضافة مريض
    async function addPatient() {
        const name = document.getElementById('pName').value;
        const proc = document.getElementById('pProc').value;
        
        const { error } = await supabase.from('appointments').insert([{ name, proc }]);
        if (error) { alert('خطأ: ' + error.message); }
        else { 
            document.getElementById('pName').value = '';
            loadPatients(); 
        }
    }

    // 4. دالة حذف مريض
    async function deletePatient(id) {
        await supabase.from('appointments').delete().eq('id', id);
        loadPatients();
    }

    // تشغيل عند التحميل
    loadPatients();
</script>
</body>
</html>
